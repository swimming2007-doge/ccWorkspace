# ArXiv Blog Agent - 日志配置

version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "[%(asctime)s] %(levelname)s [%(name)s.%(funcName)s:%(lineno)d] %(message)s"
  simple:
    format: "%(asctime)s - %(levelname)s - %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: simple
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: standard
    filename: ./logs/agent.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
    encoding: utf-8

loggers:
  arxiv_blog_agent:
    level: INFO
    handlers: [console, file]
    propagate: false

  arxiv_scraper:
    level: INFO
    handlers: [console, file]
    propagate: false

  content_generator:
    level: INFO
    handlers: [console, file]
    propagate: false

  blog_poster:
    level: INFO
    handlers: [console, file]
    propagate: false

  network_adapter:
    level: WARNING
    handlers: [console, file]
    propagate: false

root:
  level: WARNING
  handlers: [console]
