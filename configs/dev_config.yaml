# ArXiv Blog Agent - 开发环境配置
# 说明：用于本地开发和测试

agent:
  arxiv_query: "large model training inference"
  arxiv_max_results: 5  # 减少结果数以加快测试
  content_style: "professional"
  content_language: "zh"
  title_prefix: "[DEV] ArXiv 大模型训推进展 - "
  blog_status: "draft"  # 发布为草稿
  dry_run: true  # 干运行模式
  log_level: "DEBUG"

arxiv_scraper:
  base_url: "https://arxiv.org/search/"
  timeout: 30
  max_retries: 2
  proxy: null
  ssl_verify: true
  default_max_results: 5

content_generator:
  title_prefix: "[DEV] ArXiv 大模型训推进展 - "
  max_abstract_length: 200  # 缩短摘要以加快测试

blog_poster:
  blog_status: "draft"
  # 开发环境使用测试令牌
  access_token: "NzkxMDI1MzQxJTNBYXp4cCUyMGY0ZHYlMjB5c2tzJTIweWJxdiUyMA=="

network:
  timeout: 10
  log_level: "DEBUG"

logging:
  level: "DEBUG"
  file: "./logs/agent_dev.log"
