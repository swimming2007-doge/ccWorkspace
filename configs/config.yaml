# ArXiv Blog Agent - 主配置文件
# 说明：此文件包含公网环境的默认配置，可直接运行

# Agent 配置
agent:
  arxiv_query: "large model training inference"
  arxiv_max_results: 10
  content_style: "professional"  # professional / casual / academic
  content_language: "zh"
  title_prefix: "ArXiv 大模型训推进展 - "
  blog_status: "publish"  # publish / draft
  dry_run: false
  log_level: "INFO"

# ArXiv 爬取配置
arxiv_scraper:
  base_url: "https://arxiv.org/search/"
  timeout: 30
  max_retries: 3
  retry_delay: 2
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
  proxy: null
  ssl_verify: true
  default_query: "large model training inference"
  default_max_results: 10

# 内容生成配置
content_generator:
  title_prefix: "ArXiv 大模型训推进展 - "
  default_category: "AI/大模型"
  default_language: "zh"
  default_style: "professional"
  max_abstract_length: 300
  include_pdf_link: true

# 博客发布配置
blog_poster:
  api_base: "https://public-api.wordpress.com/rest/v1.1"
  blog_id: "791025341"
  blog_url: "https://swimming2007.wordpress.com/"
  # 注意：此为测试令牌，实际发布需替换为真实令牌
  # 获取方式：https://developer.wordpress.com/docs/oauth2/
  access_token: "NzkxMDI1MzQxJTNBYXp4cCUyMGY0ZHYlMjB5c2tzJTIweWJxdiUyMA=="
  default_status: "publish"
  timeout: 20
  max_retries: 3
  retry_delay: 2
  proxy: null
  ssl_verify: true

# 网络配置
network:
  timeout: 20
  connect_timeout: 10
  read_timeout: 20
  max_retries: 3
  retry_delay: 1.0
  pool_connections: 10
  pool_maxsize: 10
  proxy: null
  ssl_verify: true
  user_agent: "ArXiv-Blog-Agent/1.0"
  log_level: "INFO"

# 日志配置
logging:
  level: "INFO"
  file: "./logs/agent.log"
  format: "[%(asctime)s] %(levelname)s [%(name)s.%(funcName)s:%(lineno)d] %(message)s"
