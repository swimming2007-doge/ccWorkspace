# =============================================================================
# ArXiv Blog Agent - 集中式配置文件
# =============================================================================
#
# 说明：
# 1. 这是唯一的配置文件，包含所有模块的配置
# 2. 支持环境变量覆盖，格式：${ENV_VAR_NAME}
# 3. 所有配置项必须在下方明确定义，代码中不设置默认值
#
# 使用方法：
#   python src/main.py -c config.yaml
#
# =============================================================================

# -----------------------------------------------------------------------------
# ArXiv 爬取配置
# -----------------------------------------------------------------------------
arxiv:
  # 搜索配置
  query: "large model training inference"
  max_results: 10

  # API 配置
  api_url: "https://export.arxiv.org/api/query"

  # 网络配置
  timeout: 30
  max_retries: 3
  retry_delay: 3

  # 代理配置（内网时设置）
  proxy: null

  # SSL 配置
  ssl_verify: true

# -----------------------------------------------------------------------------
# 内容生成配置
# -----------------------------------------------------------------------------
content:
  # 写作风格: professional / casual / academic
  style: "professional"

  # 语言
  language: "zh"

  # 标题配置
  title_prefix: "ArXiv 大模型训推进展 - "

  # 分类配置
  category: "AI/大模型"

  # 摘要配置
  max_abstract_length: 300

  # 是否包含 PDF 链接
  include_pdf_link: true

# -----------------------------------------------------------------------------
# 博客发布配置 (WordPress)
# -----------------------------------------------------------------------------
# 所有参数必须在此配置，代码中不设置默认值
# -----------------------------------------------------------------------------
blog:
  # ========== WordPress API 端点 ==========
  # WordPress.com REST API 地址
  api_base: "https://public-api.wordpress.com/rest/v1.1"

  # ========== 博客标识 ==========
  # 博客 ID（从 WordPress.com 获取）
  blog_id: "253145378"

  # 博客 URL
  blog_url: "https://swimming2007.wordpress.com/"

  # ========== 认证信息 ==========
  # OAuth2 访问令牌
  # 获取方式：https://developer.wordpress.com/docs/oauth2/
  # 可使用环境变量：${WORDPRESS_ACCESS_TOKEN}
  access_token: "NIn1IRDb#eBYwyaDU5e%6d(5Rr9iBqxtnJ8IlwRZk!s6u57OqHWmW6XQTpsN&EAu"

  # ========== 发布参数 ==========
  # 发布状态: publish（公开发布）, draft（草稿）, private（私有）
  status: "publish"

  # 默认分类名称
  default_category: "AI/大模型"

  # ========== 网络配置 ==========
  # 请求超时时间（秒）
  timeout: 20

  # 最大重试次数
  max_retries: 3

  # 重试间隔（秒）
  retry_delay: 2

  # 代理地址（内网时配置）
  proxy: null

  # SSL 证书验证
  ssl_verify: true

# -----------------------------------------------------------------------------
# 日志配置
# -----------------------------------------------------------------------------
logging:
  # 日志级别: DEBUG / INFO / WARNING / ERROR
  level: "INFO"

  # 日志文件路径
  file: "./logs/agent.log"

  # 日志格式
  format: "[%(asctime)s] %(levelname)s [%(name)s] %(message)s"

# -----------------------------------------------------------------------------
# Agent 配置
# -----------------------------------------------------------------------------
agent:
  # 干运行模式（true: 不实际发布，使用模拟发布）
  dry_run: false
